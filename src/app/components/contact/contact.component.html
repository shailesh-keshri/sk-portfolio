<section id="contact" class="contact-section reveal">
  <div class="container contact-single">
    <div class="section-header">
      <h2 class="section-title">Let's Build <span class="gradient-text">Something</span></h2>
      <p class="section-subtitle">Open for new opportunities, freelance work, and collaborations.</p>
    </div>
    
    <div class="contact-info-row">
      <div class="contact-item">
        <i class="fa-solid fa-envelope"></i>
        <a href="mailto:shailesh0398@gmail.com">shailesh0398@gmail.com</a>
      </div>
      <div class="contact-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>Bengaluru, India</span>
      </div>
      <div class="social-links-row">
        <a href="https://linkedin.com/in/shailesh-keshri-463620177" target="_blank" class="glass"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="https://github.com/shailesh-keshri" target="_blank" class="glass"><i class="fa-brands fa-github"></i></a>
      </div>
    </div>
    
    <div class="contact-form-container glass">
      <form class="contact-form" #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)">
        <h3>Send a Message</h3>
        
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="formData.name" required placeholder="Your Name">
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" [(ngModel)]="formData.email" required placeholder="your.email@example.com">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject" required placeholder="What is this regarding?">
          </div>
          
          <div class="form-group">
            <label for="purpose">Purpose</label>
            <select id="purpose" name="purpose" [(ngModel)]="formData.purpose" required>
              <option value="" disabled selected>Select purpose</option>
              <option value="Freelance">Freelance Project</option>
              <option value="Job">Job Opportunity</option>
              <option value="Collaboration">Collaboration</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" [(ngModel)]="formData.message" rows="4" required placeholder="How can we work together?"></textarea>
        </div>
        
        <button type="submit" class="btn-submit-contact" [disabled]="contactForm.invalid || status === 'submitting'">
          <span *ngIf="status === 'idle' || status === 'success' || status === 'error'">Send Message <i class="fa-solid fa-paper-plane"></i></span>
          <span *ngIf="status === 'submitting'">Sending... <i class="fa-solid fa-circle-notch fa-spin"></i></span>
        </button>

        <div class="form-status success" *ngIf="status === 'success'">
          <i class="fa-solid fa-check-circle"></i> Message sent successfully! I'll get back to you soon.
        </div>
        <div class="form-status error" *ngIf="status === 'error'">
          <i class="fa-solid fa-circle-exclamation"></i> Something went wrong. Please try again or use the email link.
        </div>
      </form>
    </div>
  </div>
</section>
